name: Plugin Check (PCP)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the artifact containing the built plugin zip'
        required: true
        type: string
      plugin-slug:
        description: 'Plugin slug, used to locate the zip and the extracted directory'
        required: true
        type: string
      wp-version:
        description: 'WordPress version to test against'
        required: false
        type: string
        default: 'latest'

permissions:
  pull-requests: write

jobs:
  plugin-check:
    name: Plugin Check (PCP)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}

      - name: Unzip plugin
        run: unzip -q "$PLUGIN_SLUG.zip"
        env:
          PLUGIN_SLUG: ${{ inputs.plugin-slug }}

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@18573eb38f13543484a1f095672dae3849a4fbb0 # v1
        with:
          build-dir: './${{ inputs.plugin-slug }}'
          wp-version: ${{ inputs.wp-version }}
