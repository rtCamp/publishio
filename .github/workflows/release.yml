name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate release trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # GitHub can't restrict the ref picker in YAML, so enforce main-only at runtime.
            if [ "$REF" != "refs/heads/main" ]; then
              echo "::error::Manual dry-run must be dispatched from main (got: $REF)."
              exit 1
            fi
            echo "Manual dry-run from main — OK."
          else
            # Tag push: the release tag must point to a commit that is on main.
            if ! git merge-base --is-ancestor "refs/tags/$REF_NAME" origin/main; then
              echo "::error::Tag $REF_NAME does not point to a commit on origin/main."
              exit 1
            fi
            echo "Tag $REF_NAME is on main — OK."
          fi

  build:
    name: Build
    needs: validate
    uses: ./.github/workflows/reusable-build.yml
    with:
      php-version: '8.2'
      artifact-name: publishio
    secrets: inherit

  wordpress-org-release:
    name: Create WordPress.org release
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: publishio
          path: .

      - name: Unzip built plugin
        run: unzip -q publishio.zip -d svn-build

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # v2.3.0
        with:
          dry-run: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: publishio
          VERSION: ${{ github.ref_name }}
          BUILD_DIR: ./svn-build/publishio

  github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: publishio
          path: .

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Create the release for the pushed tag if it does not exist yet,
          # then upload the built zip (idempotent so re-runs are safe).
          if gh release view "$TAG_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" publishio.zip --clobber --repo "${{ github.repository }}"
          else
            gh release create "$TAG_NAME" publishio.zip \
              --repo "${{ github.repository }}" \
              --title "$TAG_NAME" \
              --verify-tag \
              --generate-notes
          fi
