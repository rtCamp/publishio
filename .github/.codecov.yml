# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

# Fix path prefixes from Docker container paths to repo-relative paths
fixes:
  - '/var/www/html/wp-content/plugins/rtcamp-publish-with-ai/::'

coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 5%
        informational: true
    patch:
      default:
        target: 60%
        informational: true

ignore:
  - 'tests/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/types.d.ts'
  - 'playwright.config.ts'

comment:
  layout: 'reach,diff,flags,files'
  behavior: default
  require_base: false
  require_head: true
  require_changes: true
