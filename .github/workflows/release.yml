name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate release trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # GitHub can't restrict the ref picker in YAML, so enforce main-only at runtime.
            if [ "$REF" != "refs/heads/main" ]; then
              echo "::error::Manual dry-run must be dispatched from main (got: $REF)."
              exit 1
            fi
            echo "Manual dry-run from main — OK."
          else
            # Tag push: the release tag must point to a commit that is on main.
            if ! git merge-base --is-ancestor "refs/tags/$REF_NAME" origin/main; then
              echo "::error::Tag $REF_NAME does not point to a commit on origin/main."
              exit 1
            fi
            echo "Tag $REF_NAME is on main — OK."
          fi

  build:
    name: Build
    needs: validate
    uses: ./.github/workflows/reusable-build.yml
    with:
      php-version: '8.2'
      artifact-name: publishio
    secrets: inherit

  wordpress-org-release:
    name: Create WordPress.org release
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: publishio
          path: .

      - name: Unzip built plugin
        run: unzip -q publishio.zip -d svn-build

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # v2.3.0
        with:
          dry-run: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: publishio
          VERSION: ${{ github.ref_name }}
          BUILD_DIR: ./svn-build/publishio

  github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: publishio
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: publishio.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
