name: Reusable Build

on:
  workflow_call:
    inputs:
      php-version:
        required: true
        type: string
      artifact-name:
        required: true
        type: string

jobs:
  build:
    runs-on: [high-performance]
    container:
      image: ghcr.io/actions/actions-runner@sha256:1ad983536759ceec39ed75a2c8f007ca8c37b66eee35ed86f13623b29a4db97d # v2.333.0
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /tmp/wp-env:/tmp/wp-env

    permissions:
      contents: read

    env:
      # Per-job subdir under the shared /tmp/wp-env mount keeps concurrent jobs on the
      # same self-hosted host from colliding on wp-env's md5(project_path) instance dir.
      WP_ENV_HOME: /tmp/wp-env/${{ github.run_id }}-${{ github.run_attempt }}-build

    timeout-minutes: 30

    steps:
      - name: Magic thing needed becuase of github as it bind mounts __temp
        run: |
          sudo apt update && sudo apt install -y acl
          sudo setfacl -R -m u:runner:rwX /__w /github/home /github/workflow /tmp/wp-env
          sudo setfacl -R -d -m u:runner:rwX /__w /github/home /github/workflow /tmp/wp-env
          mkdir -p "$WP_ENV_HOME"

      - name: Configure Docker group permissions
        run: |
          SOCK_GID=$(stat -c '%g' /var/run/docker.sock)
          sudo groupmod -g $SOCK_GID -o docker
          sudo usermod -aG $SOCK_GID runner

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: latest
          cache-binary: true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}

      - name: Configure Git for Safe Directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0
        with:
          composer-options: '--no-dev --optimize-autoloader'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Install npm dependencies
        run: npm ci

      - name: Build plugin for release
        run: npm run build:prod

      - name: Fix wp-env host mapping
        run: |
          # Get the host path for the workspace by inspecting the container's own mounts
          HOST_WORKSPACE_PATH=$(docker inspect $(hostname) --format '{{ range .Mounts }}{{ if eq .Destination "/__w" }}{{ .Source }}{{ end }}{{ end }}')

          # Construct the full host path for the current plugin directory
          RELATIVE_PATH=$(pwd | sed 's|^/__w||')
          PLUGIN_HOST_PATH="${HOST_WORKSPACE_PATH}${RELATIVE_PATH}"

          echo "Host Workspace: $HOST_WORKSPACE_PATH"
          echo "Plugin Host Path: $PLUGIN_HOST_PATH"

          # Find the first available host port in 8888-9000 by inspecting running Docker containers.
          # Using docker ps via the mounted socket is reliable here because port binding happens
          # at the host level, so this reflects the true allocation state across concurrent jobs.
          USED_PORTS=$(docker ps --format '{{.Ports}}' | grep -oP '\d+(?=->)' | sort -un)
          WP_ENV_PORT=""
          for PORT in $(seq 8888 9000); do
            if ! echo "$USED_PORTS" | grep -qx "$PORT"; then
              WP_ENV_PORT=$PORT
              break
            fi
          done
          if [ -z "$WP_ENV_PORT" ]; then
            echo "No available port found in range 8888-9000" >&2
            exit 1
          fi
          echo "Using wp-env port: $WP_ENV_PORT"

          # Update .wp-env.json (default env)
          jq --arg path "$PLUGIN_HOST_PATH" \
             --argjson port "$WP_ENV_PORT" \
             'del(.plugins) | .mappings["wp-content/plugins/rtcamp-publish-with-ai"] = $path | .port = $port' \
             .wp-env.json > .wp-env.json.tmp && mv .wp-env.json.tmp .wp-env.json

          cat .wp-env.json

      - name: Start the Docker testing environment
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm run wp-env start -- --update

      - name: Generate Translation files
        run: npm run i18n:make-pot

      - name: Create plugin zip
        run: npm run plugin-zip

      - name: Upload plugin zip artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: rtcamp-publish-with-ai.zip
          if-no-files-found: error

      - name: Stop the Docker testing environment
        if: always()
        run: npm run wp-env destroy -- --force

      - name: Cleanup Workspace & Home to avoid pollution
        if: always()
        run: |
          # Wipes the actual code, build artifacts, and hidden files
          sudo rm -rf ./* .[!.]* 2>/dev/null || true

          # Deletes everything inside _temp EXCEPT the locked mount points
          sudo find /__w/_temp/ -mindepth 1 -maxdepth 1 ! -name '_github_home' ! -name '_github_workflow' -exec rm -rf {} +

          # Empties the contents of the locked directories without deleting the folders themselves
          sudo rm -rf /github/home/* || true
          sudo rm -rf /github/home/.* 2>/dev/null || true

          sudo rm -rf /github/workflow/* || true
          sudo rm -rf /github/workflow/.* 2>/dev/null || true

          # Empty only this job's wp-env directory, not the shared parent.
          sudo rm -rf "$WP_ENV_HOME" || true
