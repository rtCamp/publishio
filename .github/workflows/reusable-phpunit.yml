name: Run PHPUnit Tests

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: true
        type: string
      wp-version:
        description: 'WordPress version (latest, trunk, or X.Y)'
        required: false
        type: string
        default: 'latest'
      coverage:
        description: 'Enable code coverage'
        required: false
        type: boolean
        default: false
      multisite:
        description: 'Run multisite tests'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ inputs.php-version }}, WP ${{ inputs.wp-version }})${{ inputs.coverage && ' with coverage' || '' }}${{ inputs.multisite && ' multisite' || '' }}
    runs-on: [high-performance]
    container:
      image: ghcr.io/actions/actions-runner@sha256:1ad983536759ceec39ed75a2c8f007ca8c37b66eee35ed86f13623b29a4db97d # v2.333.0
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /tmp/wp-env:/tmp/wp-env

    timeout-minutes: 30

    env:
      WP_ENV_PHP_VERSION: ${{ inputs.php-version }}
      WP_ENV_CORE: ${{ inputs.wp-version == 'trunk' && 'WordPress/WordPress' || format('https://wordpress.org/wordpress-{0}.zip', inputs.wp-version) }}
      WP_ENV_HOME: /tmp/wp-env

    steps:
      - name: Magic thing needed becuase of github as it bind mounts __temp
        run: |
          sudo apt update && sudo apt install -y acl
          sudo setfacl -R -m u:runner:rwX /__w /github/home /github/workflow /tmp/wp-env
          sudo setfacl -R -d -m u:runner:rwX /__w /github/home /github/workflow /tmp/wp-env

      - name: Configure Docker group permissions
        run: |
          SOCK_GID=$(stat -c '%g' /var/run/docker.sock)
          sudo groupmod -g $SOCK_GID -o docker
          sudo usermod -aG $SOCK_GID runner

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: latest
          cache-binary: true

      - name: Configure environment variables
        run: |
          echo "PHP_FPM_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "PHP_FPM_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}

      - name: Configure Git for Safe Directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          coverage: ${{ inputs.coverage && 'xdebug' || 'none' }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Install npm dependencies
        run: npm ci

      - name: Build development assets
        run: npm run build:dev

      - name: Fix wp-env host mapping
        run: |
          # Get the host path for the workspace by inspecting the container's own mounts
          HOST_WORKSPACE_PATH=$(docker inspect $(hostname) --format '{{ range .Mounts }}{{ if eq .Destination "/__w" }}{{ .Source }}{{ end }}{{ end }}')

          # Construct the full host path for the current plugin directory
          # We strip the internal /__w prefix and append it to the host workspace path
          RELATIVE_PATH=$(pwd | sed 's|^/__w||')
          PLUGIN_HOST_PATH="${HOST_WORKSPACE_PATH}${RELATIVE_PATH}"

          echo "Host Workspace: $HOST_WORKSPACE_PATH"
          echo "Plugin Host Path: $PLUGIN_HOST_PATH"

          # 1. Remove the "plugins" field to prevent broken automatic mounts
          # 2. Add the host mapping
          jq --arg path "$PLUGIN_HOST_PATH" \
             'del(.plugins) | .mappings["wp-content/plugins/rtcamp-publish-with-ai"] = $path' \
             .wp-env.test.json > .wp-env.test.json.tmp && mv .wp-env.test.json.tmp .wp-env.test.json

          cat .wp-env.test.json

      - name: Find free port for wp-env
        run: |
          for port in $(seq 8000 9000); do
            (echo > /dev/tcp/localhost/$port) 2>/dev/null || { FREE_PORT=$port; break; }
          done
          echo "WP_ENV_PORT=$FREE_PORT" >> $GITHUB_ENV
          echo "Assigned wp-env port: $FREE_PORT"

      - name: Start the Docker testing environment
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: |
            if [ "${{ inputs.coverage }}" == "true" ]; then
              npm run wp-env:test start -- --xdebug=coverage --update --debug
            else
              npm run wp-env:test start -- --update
            fi

      - name: Log versions
        run: |
          npm run wp-env:test -- run cli php -- -v
          npm run wp-env:test -- run cli wp core version

      - name: Run PHPUnit tests${{ inputs.coverage && ' with coverage report' || '' }}
        run: npm run test:php ${{ !inputs.coverage && '-- --no-coverage' || '' }}

      - name: Upload code coverage report
        if: ${{ inputs.coverage }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tests/_output/php-coverage.xml
          flags: unit
          fail_ci_if_error: false

      - name: Upload HTML coverage report as artifact
        if: ${{ inputs.coverage }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wp-code-coverage-${{ inputs.php-version }}-${{ inputs.wp-version }}
          path: tests/_output/html
          overwrite: true

      - name: Stop the Docker testing environment
        if: always()
        run: npm run wp-env:test destroy -- --force

      - name: Cleanup Workspace & Home to avoid pollution
        if: always()
        run: |
          # Wipes the actual code, build artifacts, and hidden files
          sudo rm -rf ./* .[!.]* 2>/dev/null || true

          # Deletes everything inside _temp EXCEPT the locked mount points
          sudo find /__w/_temp/ -mindepth 1 -maxdepth 1 ! -name '_github_home' ! -name '_github_workflow' -exec rm -rf {} +

          # Empties the contents of the locked directories without deleting the folders themselves
          sudo rm -rf /github/home/* || true
          sudo rm -rf /github/home/.* 2>/dev/null || true

          sudo rm -rf /github/workflow/* || true
          sudo rm -rf /github/workflow/.* 2>/dev/null || true

          # Empty the wp-env directory
          sudo rm -rf /tmp/wp-env/* || true
